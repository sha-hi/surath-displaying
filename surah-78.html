<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سُورَةُ النَّبَإِ</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Amiri:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css" />
</head>
<body class="surah-page">
    <div class="background-decor"></div>
    <div class="container">
        <header class="surah-header">
            <a href="index.html" class="back-btn">â† Back to Home</a>
            <div class="surah-title-box">
                <h2>سُورَةُ النَّبَإِ</h2>
                <p>An-Naba</p>
            </div>
            <div class="spacer"></div>
        </header>

        <div class="ayah-display-container glass-panel">
            <div id="ayah" class="ayah-text"></div>
        </div>

        <div class="controls-container">
            <button id="prevBtn" class="nav-btn">Previous</button>
            <div class="progress-indicator">
                <span id="currentAyahNum">1</span> / 40
            </div>
            <button id="nextBtn" class="nav-btn">Next</button>
        </div>
        
        <div class="surah-nav-links">
            <div></div>
            <a href="surah-79.html" class="side-nav">Next Surah</a>
        </div>
    </div>

    <script>
        const ayahs = ["بِسۡمِ ٱللَّهِ ٱلرَّحۡمَـٰنِ ٱلرَّحِیمِ عَمَّ یَتَسَاۤءَلُونَ\n","عَنِ ٱلنَّبَإِ ٱلۡعَظِیمِ\n","ٱلَّذِی هُمۡ فِیهِ مُخۡتَلِفُونَ\n","كَلَّا سَیَعۡلَمُونَ\n","ثُمَّ كَلَّا سَیَعۡلَمُونَ\n","أَلَمۡ نَجۡعَلِ ٱلۡأَرۡضَ مِهَـٰدࣰا\n","وَٱلۡجِبَالَ أَوۡتَادࣰا\n","وَخَلَقۡنَـٰكُمۡ أَزۡوَ ٰ⁠جࣰا\n","وَجَعَلۡنَا نَوۡمَكُمۡ سُبَاتࣰا\n","وَجَعَلۡنَا ٱلَّیۡلَ لِبَاسࣰا\n","وَجَعَلۡنَا ٱلنَّهَارَ مَعَاشࣰا\n","وَبَنَیۡنَا فَوۡقَكُمۡ سَبۡعࣰا شِدَادࣰا\n","وَجَعَلۡنَا سِرَاجࣰا وَهَّاجࣰا\n","وَأَنزَلۡنَا مِنَ ٱلۡمُعۡصِرَ ٰ⁠تِ مَاۤءࣰ ثَجَّاجࣰا\n","لِّنُخۡرِجَ بِهِۦ حَبࣰّا وَنَبَاتࣰا\n","وَجَنَّـٰتٍ أَلۡفَافًا\n","إِنَّ یَوۡمَ ٱلۡفَصۡلِ كَانَ مِیقَـٰتࣰا\n","یَوۡمَ یُنفَخُ فِی ٱلصُّورِ فَتَأۡتُونَ أَفۡوَاجࣰا\n","وَفُتِحَتِ ٱلسَّمَاۤءُ فَكَانَتۡ أَبۡوَ ٰ⁠بࣰا\n","وَسُیِّرَتِ ٱلۡجِبَالُ فَكَانَتۡ سَرَابًا\n","إِنَّ جَهَنَّمَ كَانَتۡ مِرۡصَادࣰا\n","لِّلطَّـٰغِینَ مَـَٔابࣰا\n","لَّـٰبِثِینَ فِیهَاۤ أَحۡقَابࣰا\n","لَّا یَذُوقُونَ فِیهَا بَرۡدࣰا وَلَا شَرَابًا\n","إِلَّا حَمِیمࣰا وَغَسَّاقࣰا\n","جَزَاۤءࣰ وِفَاقًا\n","إِنَّهُمۡ كَانُوا۟ لَا یَرۡجُونَ حِسَابࣰا\n","وَكَذَّبُوا۟ بِـَٔایَـٰتِنَا كِذَّابࣰا\n","وَكُلَّ شَیۡءٍ أَحۡصَیۡنَـٰهُ كِتَـٰبࣰا\n","فَذُوقُوا۟ فَلَن نَّزِیدَكُمۡ إِلَّا عَذَابًا\n","إِنَّ لِلۡمُتَّقِینَ مَفَازًا\n","حَدَاۤىِٕقَ وَأَعۡنَـٰبࣰا\n","وَكَوَاعِبَ أَتۡرَابࣰا\n","وَكَأۡسࣰا دِهَاقࣰا\n","لَّا یَسۡمَعُونَ فِیهَا لَغۡوࣰا وَلَا كِذَّ ٰ⁠بࣰا\n","جَزَاۤءࣰ مِّن رَّبِّكَ عَطَاۤءً حِسَابࣰا\n","رَّبِّ ٱلسَّمَـٰوَ ٰ⁠تِ وَٱلۡأَرۡضِ وَمَا بَیۡنَهُمَا ٱلرَّحۡمَـٰنِۖ لَا یَمۡلِكُونَ مِنۡهُ خِطَابࣰا\n","یَوۡمَ یَقُومُ ٱلرُّوحُ وَٱلۡمَلَـٰۤىِٕكَةُ صَفࣰّاۖ لَّا یَتَكَلَّمُونَ إِلَّا مَنۡ أَذِنَ لَهُ ٱلرَّحۡمَـٰنُ وَقَالَ صَوَابࣰا\n","ذَ ٰ⁠لِكَ ٱلۡیَوۡمُ ٱلۡحَقُّۖ فَمَن شَاۤءَ ٱتَّخَذَ إِلَىٰ رَبِّهِۦ مَـَٔابًا\n","إِنَّاۤ أَنذَرۡنَـٰكُمۡ عَذَابࣰا قَرِیبࣰا یَوۡمَ یَنظُرُ ٱلۡمَرۡءُ مَا قَدَّمَتۡ یَدَاهُ وَیَقُولُ ٱلۡكَافِرُ یَـٰلَیۡتَنِی كُنتُ تُرَ ٰ⁠بَۢا\n"];
        const colors = ['#FF3366', '#20A4F3', '#FFB01A', '#2EC4B6', '#8A2BE2', '#FF0054', '#4361EE', '#4CC9F0', '#F72585', '#7209B7'];
        let currentAyah = 0;

        function showAyah() {
            const text = ayahs[currentAyah];
            let words = text.split(' ');
            let coloredHtml = '';
            words.forEach((word, index) => {
                if (!word.trim()) return;
                const color = colors[index % colors.length];
                coloredHtml += '<span class="word" style="color: ' + color + ';">' + word + '</span> ';
            });
            
            const ayahEl = document.getElementById("ayah");
            ayahEl.style.opacity = 0;
            ayahEl.style.transform = 'translateY(10px)';
            
            setTimeout(() => {
                ayahEl.innerHTML = coloredHtml;
                ayahEl.style.opacity = 1;
                ayahEl.style.transform = 'translateY(0)';
                document.getElementById("currentAyahNum").innerText = currentAyah + 1;
            }, 200);
        }

        document.getElementById("nextBtn").addEventListener("click", () => {
            if (currentAyah < ayahs.length - 1) {
                currentAyah++;
                showAyah();
            } else {
                window.location.href = 'surah-79.html';
            }
        });

        document.getElementById("prevBtn").addEventListener("click", () => {
            if (currentAyah > 0) {
                currentAyah--;
                showAyah();
            } else {
                
            }
        });

        document.addEventListener("keydown", (event) => {
            if (event.key === "ArrowRight") {
                document.getElementById("prevBtn").click();
            } else if (event.key === "ArrowLeft") {
                document.getElementById("nextBtn").click();
            }
        });

        setTimeout(showAyah, 100);
    </script>
</body>
</html>
